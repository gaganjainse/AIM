services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-attendance_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-change-me}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_NAME: ${DB_NAME:-attendance_db}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      FLASK_SECRET: ${FLASK_SECRET:-docker-secret-change-me}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - app_backups:/app/backups
      - app_data:/app/data

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro

volumes:
  mysql_data:
  app_backups:
  app_data:
