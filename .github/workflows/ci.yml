name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: pip install bandit safety
      - name: Bandit security scan
        run: bandit -r . -x ./tests,./.venv,./venv,./__pycache__,./demo/screenshots -ll --exit-zero
      - name: Dependency vulnerability scan
        run: safety check -r requirements.txt || true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: pip install flake8
      - name: Flake8 linting
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.venv,venv,__pycache__,./demo/screenshots
      - name: Python syntax check
        run: python -m py_compile $(git ls-files '*.py')

  test:
    runs-on: ubuntu-latest
    needs: [security, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short -x
        env:
          FLASK_SECRET: ci-test-secret
          DB_PASSWORD: ci-test
          FLASK_DEBUG: "0"
          CACHE_TYPE: NullCache
          RATELIMIT_ENABLED: "false"
