{% extends "base.html" %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 60vh;">
    <div class="surface-panel text-center p-5" style="max-width: 32rem;">
        <div class="mb-3" style="font-size: 3rem;">🔍</div>
        <h1 class="h3 mb-2">Page Not Found</h1>
        <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
        <div class="d-flex gap-2 justify-content-center">
            <a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-ui-primary">
                <i class="bi bi-speedometer2"></i>
                <span>Dashboard</span>
            </a>
            <a href="javascript:history.back()" class="btn btn-ui-secondary">
                <i class="bi bi-arrow-left"></i>
                <span>Go Back</span>
            </a>
        </div>
    </div>
</div>
{% endblock %}
