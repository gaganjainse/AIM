{% extends "base.html" %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 60vh;">
    <div class="surface-panel text-center p-5" style="max-width: 32rem;">
        <div class="mb-3" style="font-size: 3rem;">⚠️</div>
        <h1 class="h3 mb-2">Server Error</h1>
        <p class="text-muted mb-4">Something went wrong on our end. Please try again later or contact support if the problem persists.</p>
        <div class="d-flex gap-2 justify-content-center">
            <a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-ui-primary">
                <i class="bi bi-speedometer2"></i>
                <span>Dashboard</span>
            </a>
            <button onclick="location.reload()" class="btn btn-ui-secondary">
                <i class="bi bi-arrow-clockwise"></i>
                <span>Retry</span>
            </button>
        </div>
    </div>
</div>
{% endblock %}
